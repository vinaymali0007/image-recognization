services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neuroscan-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DEBUG: "False"
      MODEL_PATH: weights/cnn.pth
      UPLOAD_FOLDER: uploads
      MAX_UPLOAD_SIZE: 10485760
      CORS_ORIGINS: "*"
      JWT_SECRET: supersecretkeychangeinproduction

      DATABASE_URL: postgresql+pg8000://postgres:postgres@postgres:5432/neuroscan
      MONGO_URI: mongodb://mongodb:27017/neuroscan

    volumes:
      - ./backend/uploads:/app/uploads

    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000

    container_name: neuroscan-frontend

    ports:
      - "80:80"

    depends_on:
      - backend

    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: neuroscan-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: neuroscan

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d neuroscan"]
      interval: 10s
      timeout: 5s
      retries: 5

    restart: unless-stopped

  mongodb:
    image: mongo:6-jammy
    container_name: neuroscan-mongodb

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

    restart: unless-stopped

volumes:
  postgres_data:
  mongodb_data: